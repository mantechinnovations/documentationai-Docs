        "description": "Determines the user type for a given email address. The UserTy\\[e attribute could either hold `Provider` or `User` as a value\n\n### Purpose\n\nUse this endpoint to look up which **UserType** (e.g., `Provider`) is associated with the provided email. The response also includes basic profile identifiers (IDs and contact fields) for the matched user.\n\n### Query parameters\n\n| Name | Type | Required | Description |\n| --- | --- | --- | --- |\n| `Email` | string | Yes | Email address to check. Must be URL-encoded when it contains special characters (e.g., `+`, spaces). |\n\n### Example request\n\n``` http\nGET https://d300b.twidget.io/checkusertype?Email=drdeepakhbk@gmail.com\n\n ```\n\n### Example 200 response\n\n``` json\n[\n  {\n    \"AdminUserMasterID\": 1,\n    \"City\": \"Mumbai\",\n    \"CityID\": 9,\n    \"Mobile\": \"8380021488\",\n    \"UserType\": \"Provider\"\n  }\n]\n\n ```\n\n### Example 200 response: When User Not Found\n\nTake a note of the `AdminUserMasterID` attribute returning `0` if the data is not found.\n\n``` json\n[\n    {\n        \"AdminUserMasterID\": 0,\n        \"City\": null,\n        \"CityID\": 0,\n        \"Mobile\": \"0\",\n        \"UserType\": \"User type not found\"\n    }\n]\n\n ```"
      },
