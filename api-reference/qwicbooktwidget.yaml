        "description": "## Purpose\n\nRetrieve provider details for a specific appointment booking.\n\nThis endpoint returns an array of provider detail records associated with the given appointment booking ID (for example, provider name, qualification, service/location details, and appointment time changes).\n\n---\n\n## Endpoint & Method\n\n- **Method:** `GET`\n    \n- **URL:** `https://d300b.twidget.io/getproviderdetailsbyappointment`\n    \n\n---\n\n## Query Parameters\n\n### Required\n\n- `AppointmentBookingId` _(number | string)_\n    - The appointment booking identifier to look up provider details.\n        \n\n### Optional\n\n- None documented.\n    \n\n---\n\n## Example Request\n\n``` http\nGET https://d300b.twidget.io/getproviderdetailsbyappointment?AppointmentBookingId=7871\n\n ```\n\n**cURL**\n\n``` bash\ncurl --request GET \\\n  --url 'https://d300b.twidget.io/getproviderdetailsbyappointment?AppointmentBookingId=7871'\n\n ```\n\n---\n\n## Example 200 Response: When the Time Delay Is Set\n\n> Note: this API is to be used when we want to find out the New Time based on the Time Delay set by the doctor. The `NewTime`attribute shows a time if the Time Delay has been set by the doctor. If `NewTime` attribute indicates the value `On Time!` it means the Time Delay function is inactive and the doctor is running on schedule. \n  \n\n``` json\n[\n    {\n        \"Address\": \"Lokhandwala Complex, Andheri (W) Mumbai - 400053\",\n        \"AppointmentBookingID\": 7871,\n        \"Category\": \"Doctor\",\n        \"FullName\": \"Dr. Deepak Kansara\",\n        \"Message\": \"Providers details for your appointment\",\n        \"Mobile\": \"8380021488\",\n        \"NewTime\": \"11:32 (Your new time)\",\n        \"OldTime\": \"11:05\",\n        \"Qualification\": \"General Physician\",\n        \"ServiceName\": \"Lokhandwala Clinic\"\n    }\n]\n\n ```\n\n---\n\n## Example 200 Response: When the Time Delay Is Inactive\n\n``` json\n[\n    {\n        \"Address\": \"Lokhandwala Complex, Andheri (W) Mumbai - 400053\",\n        \"AppointmentBookingID\": 7810,\n        \"Category\": \"Doctor\",\n        \"FullName\": \"Dr. Deepak Kansara\",\n        \"Message\": \"Providers details for your appointment\",\n        \"Mobile\": \"8380021488\",\n        \"NewTime\": \"On Time!\",\n        \"OldTime\": \"18:25\",\n        \"Qualification\": \"General Physician\",\n        \"ServiceName\": \"Lokhandwala Clinic\"\n    }\n]\n\n ```\n\n## Nagitive Validation:\n\nThis scenario should not exists as there will always the AppointmentBookingID available to fetch the New and the Old Time.\n\n``` json\n[\n    {\n        \"Address\": \"Untitled\",\n        \"AppointmentBookingID\": 78719,\n        \"Category\": \"Untitled\",\n        \"FullName\": \"Untitled\",\n        \"Message\": \"Unable to find the correct appointment\",\n        \"Mobile\": \"Untitled\",\n        \"NewTime\": \"00:00\",\n        \"OldTime\": \"00:00\",\n        \"Qualification\": \"Untitled\",\n        \"ServiceName\": \"Not Found\"\n    }\n]\n\n ```\n\n### Field Notes\n\n- `AppointmentBookingID` is returned in the response and should correspond to the `AppointmentBookingId` query param.\n    \n- `Mobile` may contain sensitive phone data; avoid logging it in plaintext.\n    \n- `OldTime` / `NewTime` indicate time changes (if applicable).\n    \n\n---\n\n## Error / Edge Case Notes\n\nThis request currently has no saved error examples. Typical patterns to watch for:\n\n- **400 Bad Request**: missing/invalid `AppointmentBookingId`.\n    \n- **404 Not Found**: no provider details found for the given booking ID.\n    \n- **500 Internal Server Error**: unexpected server-side failure.\n    \n\nSuggested client-side handling:\n\n- Validate `AppointmentBookingId` is present and numeric before calling.\n    \n- If response is an empty array, treat as “no data found” (depending on backend behavior).\n    \n\n---"
