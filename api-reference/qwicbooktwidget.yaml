        ## Base URL


        `https://d300b.twidget.io`


        ## Endpoint


        `GET /providerdetails`


        ## Query parameters


        | Parameter | Type | Required | Description |

        | --- | --- | --- | --- |

        | `AdminUserMasterId` | integer | Yes | Admin user master identifier
        used to look up provider/service details. |


        ## Example request


        ``` http

        GET https://d300b.twidget.io/providerdetails?AdminUserMasterId=1

         ```

        ## Example 200 response


        ``` json

        [
          {
