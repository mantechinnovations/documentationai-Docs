        "description": "## Check Is Subscription Active\n\nChecks whether a provider's subscription is active for a given booking date. Returns subscription status details including a descriptive message and a flag indicating whether the subscription is currently active.\n\n**NOTE**: Always check the flag value `0` or 1 in the attribute `SubScriptionActiveFlag. 0` indicates subscription is not valid. In this case do not allow the appointments to be booked. `1` means that the subscription is valid and good to proceed with booking.\n\n---\n\n## Query Parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| `AdminUserMasterId` | integer | Yes | The unique identifier of the admin user (provider) whose subscription status is being checked. |\n| `BookingDate` | string | Yes | The date for which the subscription status should be verified. Format: `DD-Mon-YYYY` (e.g., `28-Mar-2026`). |\n\n---\n\n## Response Fields\n\n| Field | Type | Description |\n| --- | --- | --- |\n| `AdminUserMasterID` | integer | The ID of the admin user master record associated with the subscription check. Returns `0` if the provider is not found or subscription is inactive. |\n| `BookingDate` | string / null | The booking date used for the subscription check. Returns `null` if the date is not applicable or the subscription is inactive. |\n| `SubScriptionActiveDescription` | string | A human-readable message describing the subscription status. For example: `\"The Provider Does Not Accept Appointment\"` when the subscription is inactive. |\n| `SubScriptionActiveFlag` | integer | A flag indicating the subscription status. `1` means the subscription is active; `0` means it is inactive or the provider does not accept appointments. |\n\n---\n\n## Example Request\n\n```\nGET https://d300b.twidget.io/checkissubscriptionactive?AdminUserMasterId=1&BookingDate=28-Mar-2026\n\n ```\n\n## Example Response: When Subscription Is Not Active (\"SubScriptionActiveFlag\": 0)\n\n``` json\n{\n  \"AdminUserMasterID\": 0,\n  \"BookingDate\": null,\n  \"SubScriptionActiveDescription\": \"The Provider Does Not Accept Appointment\",\n  \"SubScriptionActiveFlag\": 0\n}\n\n ```\n\n## Example Response: When Subscription Is Active (\"SubScriptionActiveFlag\": 1)\n\n``` json\n{\n    \"AdminUserMasterID\": 0,\n    \"BookingDate\": null,\n    \"SubScriptionActiveDescription\": \"The Subscription is valid\",\n    \"SubScriptionActiveFlag\": 1\n}\n\n ```"
