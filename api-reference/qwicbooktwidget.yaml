        "description": "## Purpose\n\nFetches the list of appointment bookings for a given shop/service (`APServiceId`) on a specific date (`AppointmentDate`).\n\nThis endpoint returns an array of appointment objects (one per booking/time slot) with patient/display information, timing, token/sequence, and check-in/check-out flags.\n\nNote: Use this api to fetch the appointments booked for a Shop and specific date.\n\n---\n\n## Method & Endpoint\n\n`GET /getappointmentbyshop`\n\n---\n\n## Required query parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| `APServiceId` | number | Yes | Service/shop identifier to fetch appointments for. |\n| `AppointmentDate` | string | Yes | Appointment date to query. Example format observed: `9-Feb-2026` (also returned as `09-Feb-2026` in the response). |\n\n---\n\n## Example request URL\n\n``` text\nhttps://d300b.twidget.io/getappointmentbyshop?APServiceId=1&AppointmentDate=9-Feb-2026\n\n ```\n\n---\n\n## Response\n\n**200 OK**\n\nReturns a JSON array of appointment objects.\n\n### Appointment object (key fields)\n\n| Field | Type | Meaning |\n| --- | --- | --- |\n| `APServiceTransID` | number | Unique transaction/row identifier for the appointment entry. |\n| `AppointmentBookingID` | number | Booking identifier for the appointment. |\n| `AdminUserMasterID` | number | Admin/user identifier associated with the booking. |\n| `BookedForDate` | string | Date the appointment is booked for (e.g., `09-Feb-2026`). |\n| `BookingDate` | string | Date the booking was created. |\n| `FromTime` | string | Start time for the appointment slot (e.g., `11:00`). |\n| `ToTime` | string | End time for the appointment slot (e.g., `11:05`). |\n| `TokenNumber` | string/number | Token/queue number for the appointment (often increments for the day). |\n| `SequenceNumber` | string/number | Sequence value (may represent ordering/priority; observed values like `0`, `1`). |\n| `PatientName` | string | Patient name for the booking. |\n| `DisplayName` | string | Display label for the booking (often includes name and source/user type). |\n| `ParentName` | string | Parent/source label (e.g., channel/user type such as `Web User`). |\n| `Remarks` | string | Free-text notes/remarks captured with the booking. |\n| `UserIn` | number (0/1) | Check-in flag (1 = in/checked in; 0 = not checked in). |\n| `UserOut` | number (0/1) | Check-out flag (1 = out/checked out; 0 = not checked out). |\n\n### Sample response\n\n``` json\n[\n  {\n    \"APServiceTransID\": 28891,\n    \"AdminUserMasterID\": 6,\n    \"AppointmentBookingID\": 7870,\n    \"BookedForDate\": \"09-Feb-2026\",\n    \"BookingDate\": \"08-Feb-2026\",\n    \"DisplayName\": \"Tushar (Web User)\",\n    \"FromTime\": \"11:00\",\n    \"ParentName\": \"Web User\",\n    \"PatientName\": \"Tushar\",\n    \"Remarks\": \"8380021488 - Bot - Testing\",\n    \"SequenceNumber\": \"0\",\n    \"ToTime\": \"11:05\",\n    \"TokenNumber\": \"1\",\n    \"UserIn\": 0,\n    \"UserOut\": 0\n  }\n]\n\n ```\n\n## Negative Validation: When No Appointments Are Booked For A Specific Date:\n\nThe `APServiceTransactionID` is always `0`\n\n``` json\n[\n    {\n        \"APServiceTransID\": 0,\n        \"AdminUserMasterID\": 0,\n        \"AppointmentBookingID\": 0,\n        \"BookedForDate\": null,\n        \"BookingDate\": null,\n        \"DisplayName\": \"No Appointments Found!\",\n        \"FromTime\": \"\",\n        \"ParentName\": null,\n        \"PatientName\": null,\n        \"Remarks\": \"\",\n        \"SequenceNumber\": null,\n        \"ToTime\": null,\n        \"TokenNumber\": \"0\",\n        \"UserIn\": 0,\n        \"UserOut\": 0\n    }\n]\n\n ```\n\n## Notes\n\n- The endpoint returns an empty array (`[]`) when there are no appointments for the given `APServiceId` and `AppointmentDate`."
