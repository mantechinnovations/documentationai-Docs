  /getappointmentbyshop:
    get:
      summary: getappointmentbyshop
      description: >-
        ## Purpose


        Fetches the list of appointment bookings for a given shop/service
        (`APServiceId`) on a specific date (`AppointmentDate`).


        This endpoint returns an array of appointment objects (one per
        booking/time slot) with patient/display information, timing,
        token/sequence, and check-in/check-out flags.


        Note: Use this api to fetch the appointments booked for a Shop and
        specific date.


        ---


        ## Method & Endpoint


        `GET /getappointmentbyshop`


        ---


        ## Required query parameters


        | Parameter | Type | Required | Description |

        | --- | --- | --- | --- |

        | `APServiceId` | number | Yes | Service/shop identifier to fetch
        appointments for. |

        | `AppointmentDate` | string | Yes | Appointment date to query. Example
        format observed: `9-Feb-2026` (also returned as `09-Feb-2026` in the
        response). |


        ---


        ## Example request URL


        ``` text

        https://d300b.twidget.io/getappointmentbyshop?APServiceId=1&AppointmentDate=9-Feb-2026

         ```

        ---


        ## Response


        **200 OK**


        Returns a JSON array of appointment objects.


        ### Appointment object (key fields)


        | Field | Type | Meaning |

        | --- | --- | --- |

        | `APServiceTransID` | number | Unique transaction/row identifier for
        the appointment entry. |

        | `AppointmentBookingID` | number | Booking identifier for the
        appointment. |

        | `AdminUserMasterID` | number | Admin/user identifier associated with
        the booking. |

        | `BookedForDate` | string | Date the appointment is booked for (e.g.,
        `09-Feb-2026`). |

        | `BookingDate` | string | Date the booking was created. |

        | `FromTime` | string | Start time for the appointment slot (e.g.,
        `11:00`). |

        | `ToTime` | string | End time for the appointment slot (e.g., `11:05`).
        |

        | `TokenNumber` | string/number | Token/queue number for the appointment
        (often increments for the day). |

        | `SequenceNumber` | string/number | Sequence value (may represent
        ordering/priority; observed values like `0`, `1`). |

        | `PatientName` | string | Patient name for the booking. |

        | `DisplayName` | string | Display label for the booking (often includes
        name and source/user type). |

        | `ParentName` | string | Parent/source label (e.g., channel/user type
        such as `Web User`). |

        | `Remarks` | string | Free-text notes/remarks captured with the
        booking. |

        | `UserIn` | number (0/1) | Check-in flag (1 = in/checked in; 0 = not
        checked in). |

        | `UserOut` | number (0/1) | Check-out flag (1 = out/checked out; 0 =
        not checked out). |


        ### Sample response


        ``` json

        [
          {
            "APServiceTransID": 28891,
            "AdminUserMasterID": 6,
            "AppointmentBookingID": 7870,
            "BookedForDate": "09-Feb-2026",
            "BookingDate": "08-Feb-2026",
            "DisplayName": "Tushar (Web User)",
            "FromTime": "11:00",
            "ParentName": "Web User",
            "PatientName": "Tushar",
            "Remarks": "8380021488 - Bot - Testing",
            "SequenceNumber": "0",
            "ToTime": "11:05",
            "TokenNumber": "1",
            "UserIn": 0,
            "UserOut": 0
          }
        ]

         ```

        ## Negative Validation: When No Appointments Are Booked For A Specific
        Date:


        The `APServiceTransactionID` is always `0`


        ``` json

        [
            {
                "APServiceTransID": 0,
                "AdminUserMasterID": 0,
                "AppointmentBookingID": 0,
                "BookedForDate": null,
                "BookingDate": null,
                "DisplayName": "No Appointments Found!",
                "FromTime": "",
                "ParentName": null,
                "PatientName": null,
                "Remarks": "",
                "SequenceNumber": null,
                "ToTime": null,
                "TokenNumber": "0",
                "UserIn": 0,
                "UserOut": 0
            }
        ]

         ```

        ## Notes


        - The endpoint returns an empty array (`[]`) when there are no
        appointments for the given `APServiceId` and `AppointmentDate`.
      operationId: getappointmentbyshop
