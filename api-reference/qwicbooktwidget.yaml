  /insertappointments:
    post:
      summary: insertappointments
      description: >-
        ### Purpose


        Create/insert a new appointment in the Qwicbook system.


        ### Endpoint


        - **Method:** `POST`
            
        - **URL:** `https://d300b.twidget.io/insertappointments`
            

        ### Authentication


        - Not configured in this request.
            

        ### Headers


        - This endpoint expects JSON.
            
        - Typical header:
            
            - `Content-Type: application/json`
                

        ### Request body (JSON)


        | Field | Type | Required | Description | Example |

        | --- | --- | --- | --- | --- |

        | `AdminUserMasterID` | string/number | Yes | Always pass `6`. This
        identifies that the booking is being done by receptionist. | `"6"` |

        | `APServiceTransID` | string/number | Yes | Slot reference ID. |
        `"28893"` |

        | `Remarks` | string | No | Notes/remarks for the appointment. | `"from
        postman Twidget"` |

        | `BookedForDate` | string | Yes | Appointment date. See **Date format**
        notes below. | `"3-Mar-2026"` |

        | `PatientName` | string | Yes | Patient/customer name. | `"Tushar
        Parmar"` |

        | `AlternateMobile` | string | No | Patient Mobile Number for contact. |
        `"7391891540"` |


        ### Example request


        ``` json

        POST https://d300b.twidget.io/insertappointments

        Content-Type: application/json

        {
          "AdminUserMasterID": "6",
          "APServiceTransID": "28893",
          "Remarks": "from postman Twidget",
          "BookedForDate": "16-Mar-2026",
          "PatientName": "Tushar Parmar",
          "AlternateMobile": "7391891540"
        }

         ```

        ### Example responses (generic)


        #### Success (200 OK) - If `AppointmentBookinfID` value is greater than
        `0`


        ``` json

        [
            {
                "AppointmentBookingID": 7931,
                "Token": "3"
            }
        ]

         ```

        #### Error (200 OK): If the `AppointmentBookingID` value is equal to `0`


        ``` json

        [
            {
                "AppointmentBookingID": 0,
                "Token": "0"
            }
        ]

         ```

        ### Notes / validations


        - Logic: Write your logic based on the response attribute
        AppointmentBookingID. If it returns 0 then the appointment is not
        booked. Most of the times its because someone booked the same slot
        before you.
            
        - **Date format:** `BookedForDate` is currently sent as `3-Mar-2026`
        (e.g., `D-MMM-YYYY`). Ensure the server accepts this exact format and
        locale (English month abbreviations).
            
        - **IDs as strings:** `AdminUserMasterID` and `APServiceTransID` are
        sent as strings here. If the API expects numbers, send them as JSON
        numbers instead.
            
        - **Mobile number:** `AlternateMobile` should typically be digits only;
        length is 10 digits.
            
        - **Required fields:** If any required field is missing/blank, expect a
        400-level validation response.
      operationId: insertappointments
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                APServiceTransID:
                  type: string
                  example: '28893'
                AdminUserMasterID:
                  type: string
                  example: '6'
                AlternateMobile:
                  type: string
                  example: '8380021488'
                BookedForDate:
                  type: string
                  example: 3-Mar-2026
                PatientName:
                  type: string
                  example: TPTWIDGET
                Remarks:
                  type: string
                  example: from postman Twidget
            examples:
              insertappointments:
                value:
                  APServiceTransID: '28893'
                  AdminUserMasterID: '6'
                  AlternateMobile: '8380021488'
                  BookedForDate: 3-Mar-2026
                  PatientName: TPTWIDGET
                  Remarks: from postman Twidget
      responses:
        '200':
          description: insertappointments / insertappointments
          headers:
            Access-Control-Allow-Credentials:
              schema:
                type: string
                example: 'true'
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '43'
            Date:
              schema:
                type: string
                example: Sat, 28 Feb 2026 07:21:10 GMT
            ETag:
              schema:
                type: string
                example: W/"2b-hm9x6cstajhabSM+onsYURaYbuM"
            Strict-Transport-Security:
              schema:
                type: string
                example: max-age=15724800; includeSubDomains
            Vary:
              schema:
                type: string
                example: Origin
            X-Powered-By:
              schema:
                type: string
                example: Express
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    AppointmentBookingID:
                      type: number
                      example: 0
                    Token:
                      type: string
                      example: '0'
                example:
                  - AppointmentBookingID: 0
                    Token: '0'
              examples:
                insertappointments:
                  value:
                    - AppointmentBookingID: 7876
                      Token: '3'
      security:
        - {}
  /insertlatedetails:
    post:
      summary: insertlatedetails
      description: >-
        ## Purpose


        Create or update a "late" notification/message for a Doctor. Use this
        End Point to save Late Details that the doctor will publish to their
        patients. Example: Like, I am running late by 30 minutes.


        ## Endpoint


        - **Method:** `POST`
            
        - **URL:** `https://d300b.twidget.io/insertlatedetails`
            

        ## Request Body (JSON)


        Send a JSON object with the following fields:


        | Field | Type | Required | Notes |

        | --- | --- | --- | --- |

        | `LateID` | string (numeric) | Yes | Use **`"0"`** to create a new late
        record. Use an existing ID value to update an existing record. |

        | `AdminUserMasterID` | string (numeric) | Yes | Docor ID identifier. |

        | `LateDate` | string | Yes | Date string. Based on current usage:
        `d-MMM-yyyy` (example: `9-Feb-2026`). |

        | `LateTime` | string | Yes | Time string. Based on current usage:
        `HH:mm` 24-hour format (example: `11:27`). |

        | `Message` | string | Yes | Message/reason (free text). |


        ### Sample Request Body


        ``` json

        {
          "LateID": "0",
          "AdminUserMasterID": "1",
          "LateDate": "9-Feb-2026",
          "LateTime": "11:27",
          "Message": "Sorry running late"
        }

         ```

        In the above JSON, the `LateTime` is being displayed as `11:27` meaning
        that the doctor is going to be late by `27 minutes`. Assuming the doctor
        starts his clinic at 11:00.


        ## Success Response


        - **HTTP 200 OK**
            
        - **Body:** `1`
            

        Example:


        ``` text

        1

         ```
