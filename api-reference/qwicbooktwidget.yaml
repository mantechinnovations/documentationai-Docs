  /insertooo:
    post:
      summary: insertooo
      description: >-
        ## Purpose


        Creates or updates an “Out Of Office (OOO)” entry for a Doctor.


        ## Endpoint


        `POST https://d300b.twidget.io/insertooo`


        ## Request body (JSON)


        Send a JSON object in the request body.


        ### Fields


        | Field | Type | Required | Notes / Format |

        | --- | --- | --- | --- |

        | `OOOID` | string (numeric ID) | Yes | OOO record identifier. ALways
        use`"0"` to create a new OOO entry; or to update |

        | `AdminUserMasterID` | string (numeric ID) | Yes | Doctor ID to which
        the OOO entry belongs to. |

        | `IsOOO` | string or number | Yes | Flag indicating OOO status: `0` =
        not OOO, `1` = OOO. |

        | `OOOFrom` | string (datetime) | Yes | Start datetime in ISO 8601
        format (e.g., `YYYY-MM-DDTHH:mm:ss`). Example: `2026-02-01T00:00:00`. |

        | `OOOTo` | string (datetime) | Yes | End datetime in ISO 8601 format
        (e.g., `YYYY-MM-DDTHH:mm:ss`). Example: `2026-02-10T00:00:00`. |

        | `OOOMessage` | string | Yes | Message to display while the user is out
        of office. |


        ## Example request payload


        ``` json

        {
          "OOOID": "0",
          "AdminUserMasterID": "1",
          "IsOOO": "0",
          "OOOFrom": "2026-02-01T00:00:00",
          "OOOTo": "2026-02-10T00:00:00",
          "OOOMessage": "I am out of office"
        }

         ```

        ## Response


        ### Success


        - **HTTP 200 OK**
            
        - Response body (based on the current successful response):
            - `1`
                

        The value `1` indicates the operation succeeded. Note, that the value
        returned is always `1` irrespective of success or failure. So, endure
        that the operation is validated agains the table `Admin_OOO` after an
        update.
      operationId: insertooo
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                AdminUserMasterID:
                  type: string
                  example: '1'
                IsOOO:
                  type: string
                  example: '0'
                OOOFrom:
                  type: string
                  example: '2026-02-01T00:00:00'
                OOOID:
                  type: string
                  example: '0'
                OOOMessage:
                  type: string
                  example: I am out of office.
                OOOTo:
                  type: string
                  example: '2026-02-10T00:00:00'
            examples:
              insertooo:
                value:
                  AdminUserMasterID: '1'
                  IsOOO: '0'
                  OOOFrom: '2026-02-01T00:00:00'
                  OOOID: '0'
                  OOOMessage: I am out of office.
                  OOOTo: '2026-02-10T00:00:00'
      responses:
        '200':
          description: insertooo
