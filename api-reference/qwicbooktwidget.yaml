  /getooo:
    get:
      summary: getooo
      description: >-
        ## Overview


        Retrieves the **Out Of Office (OOO)** status and data for a doctor.


        This endpoint returns a JSON with FromTime and ToTime as Dates in format
        dd-MMM-yyyy. It also has a flaf "IsOOO" = 1 or 0; where 1 means Out of
        Office (check box checked) and "0" means Working. Uncheck the checkbox.
        The "OOOMeaage" is the message that is displayed on the App., and on the
        ChatBot that the doctor has entered.


        ## Endpoint


        `GET /getooo`


        Base URL (as currently configured):  

        `https://d300b.twidget.io`


        ## Required query parameters


        | Parameter | Type | Required | Description |

        | --- | --- | --- | --- |

        | `AdminUserMasterId` | integer | Yes | Admin user identifier to fetch
        OOO details for. |


        ## Example request


        ``` http

        GET https://d300b.twidget.io/getooo?AdminUserMasterId=1

         ```

        ## Example 200 response - Positive Test Results


        ``` json

        {
          "AdminUserMasterID": 1,
          "IsOOO": 1,
          "OOOFrom": "19-Mar-2026, Thu",
          "OOOID": 2,
          "OOOMessage": "I am out of office.",
          "OOOTo": "19-Mar-2026, Thu"
        }

         ```

        ## Example 200 response - Negative Test Results


        ``` json

        {
            "AdminUserMasterID": 999,
            "IsOOO": 0,
            "OOOFrom": "",
            "OOOID": 0,
            "OOOMessage": "",
            "OOOTo": ""
        }

         ```

        ## Response fields (observed)


        | Field | Type | Description |

        | --- | --- | --- |

        | `AdminUserMasterID` | integer | Admin user identifier returned by the
        service. |

        | `IsOOO` | integer | OOO flag (commonly `1` = out of office, `0` = not
        out of office). |

        | `OOOFrom` | string | Start date of OOO range (formatted as returned by
        the API). |

        | `OOOID` | integer | OOO record identifier. |

        | `OOOMessage` | string | Message shown when user is out of office. |

        | `OOOTo` | string | End date of OOO range (formatted as returned by the
        API). |


        ## Notes / behavior


        - If `AdminUserMasterId` does not exist or is invalid, the API may
        return an error or an empty/alternate payload depending on backend
        behavior.
            
        - Date fields (`OOOFrom`, `OOOTo`) are returned as formatted strings
        (not ISO 8601) as observed in the current response.
            
        - `IsOOO` is returned as a numeric flag; treat it as a boolean-like
        value in client logic.
      operationId: getooo
