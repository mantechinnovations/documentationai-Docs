        "description": "## Purpose\n\nRetrieve the appointment schedule (time slots) for a given service (`APServiceId`) on a specific date/time context.\n\nThis endpoint returns an array of time slots with token information embedded in `FromTime`.\n\nExample: Assuming today is 14-Mar-26 (TodayDate). On this date, want to book a future appointment for 16-Mar-26 (CurrentDate) at 14:30 (TodayTime).\n\nNote: The Slots (ToTime) are dynamic based upon the appointment date; meaning, past dates appointments cannot be booked included past time.\n\n---\n\n## Query parameters\n\n| Parameter | Type | Required | Example | Description |\n| --- | --- | --- | --- | --- |\n| `APServiceId` | integer | Yes | `1` | Shop Identifier |\n| `CurrentDate` | string (date) | Yes | `14-Mar-2026` | Date <u>for </u> which the booking should be done. |\n| `TodayDate` | string (date) | Yes | `16-Mar-2026` | The date on which the schedule is being fetched. |\n| `TodayTime` | string (time) | Yes | `14:30` | Time <u>for </u> which the booking should be done. |\n\n---\n\n## Example request\n\n``` http\nGET https://d300b.twidget.io/getschedule?APServiceId=1&CurrentDate=14-Mar-2026&TodayDate=16-Mar-2026&TodayTime=14:30\n\n ```\n\n---\n\n## Example response (200): Positive Validation when slots are available.\n\n``` json\n[\n  {\n    \"APServiceID\": 1,\n    \"APServiceTransID\": 29335,\n    \"CurrentDate\": null,\n    \"Day\": 0,\n    \"DayPart\": \"M\",\n    \"FromTime\": \"11:00 | TKN: 1\",\n    \"IsOOOFlag\": 0,\n    \"ToTime\": \"11:05\"\n  },\n  {\n    \"APServiceID\": 1,\n    \"APServiceTransID\": 29336,\n    \"CurrentDate\": null,\n    \"Day\": 0,\n    \"DayPart\": \"M\",\n    \"FromTime\": \"11:05 | TKN: 2\",\n    \"IsOOOFlag\": 0,\n    \"ToTime\": \"11:10\"\n  }\n]\n\n ```\n\n## Example response: When there are no slots available for a given date\n\n``` json\n[\n    {\n        \"APServiceID\": 0,\n        \"APServiceTransID\": 0,\n        \"CurrentDate\": null,\n        \"Day\": 0,\n        \"DayPart\": null,\n        \"FromTime\": \"No Schedule for the day\",\n        \"IsOOOFlag\": 0,\n        \"ToTime\": null\n    }\n]\n\n ```\n\n### Date/time formats\n\n- `CurrentDate` / `TodayDate` are expected in `DD-MMM-YYYY` format (e.g., `14-Mar-2026`).\n    \n- `TodayTime` is expected in 24-hour `HH:mm` format (e.g., `14:30`).\n    \n\n### Token parsing (`FromTime`)\n\n- `FromTime` contains a human-readable time plus token, typically in the form: Always use the FormTime to display the available slots.\n    \n    - `\"HH:mm | TKN: N\"`\n        \n- If you need the token as a number, parse the substring after `TKN:` and trim whitespace.\n    \n\n### Flags\n\n- `IsOOOFlag` indicates out-of-office/unavailable status (commonly `0` for available, `1` for unavailable)."
