  /getproviderdetailsbyappointment:
    get:
      summary: getproviderdetailsbyappointment
      description: >-
        ## Purpose


        Retrieve provider details for a specific appointment booking.


        This endpoint returns an array of provider detail records associated
        with the given appointment booking ID (for example, provider name,
        qualification, service/location details, and appointment time changes).


        ---


        ## Endpoint & Method


        - **Method:** `GET`
            
        - **URL:** `https://d300b.twidget.io/getproviderdetailsbyappointment`
            

        ---


        ## Query Parameters


        ### Required


        - `AppointmentBookingId` _(number | string)_
            - The appointment booking identifier to look up provider details.
                

        ### Optional


        - None documented.
            

        ---


        ## Example Request


        ``` http

        GET
        https://d300b.twidget.io/getproviderdetailsbyappointment?AppointmentBookingId=7871

         ```

        **cURL**


        ``` bash

        curl --request GET \
          --url 'https://d300b.twidget.io/getproviderdetailsbyappointment?AppointmentBookingId=7871'

         ```

        ---


        ## Example 200 Response: When the Time Delay Is Set


        > Note: this API is to be used when we want to find out the New Time
        based on the Time Delay set by the doctor. The `NewTime`attribute shows
        a time if the Time Delay has been set by the doctor. If `NewTime`
        attribute indicates the value `On Time!` it means the Time Delay
        function is inactive and the doctor is running on schedule. 
          

        ``` json

        [
            {
                "Address": "Lokhandwala Complex, Andheri (W) Mumbai - 400053",
                "AppointmentBookingID": 7871,
                "Category": "Doctor",
                "FullName": "Dr. Deepak Kansara",
                "Message": "Providers details for your appointment",
                "Mobile": "8380021488",
                "NewTime": "11:32 (Your new time)",
                "OldTime": "11:05",
                "Qualification": "General Physician",
                "ServiceName": "Lokhandwala Clinic"
            }
        ]

         ```

        ---


        ## Example 200 Response: When the Time Delay Is Inactive


        ``` json

        [
            {
                "Address": "Lokhandwala Complex, Andheri (W) Mumbai - 400053",
                "AppointmentBookingID": 7810,
                "Category": "Doctor",
                "FullName": "Dr. Deepak Kansara",
                "Message": "Providers details for your appointment",
                "Mobile": "8380021488",
                "NewTime": "On Time!",
                "OldTime": "18:25",
                "Qualification": "General Physician",
                "ServiceName": "Lokhandwala Clinic"
            }
        ]

         ```

        ## Nagitive Validation:


        This scenario should not exists as there will always the
        AppointmentBookingID available to fetch the New and the Old Time.


        ``` json

        [
            {
                "Address": "Untitled",
                "AppointmentBookingID": 78719,
                "Category": "Untitled",
                "FullName": "Untitled",
                "Message": "Unable to find the correct appointment",
                "Mobile": "Untitled",
                "NewTime": "00:00",
                "OldTime": "00:00",
                "Qualification": "Untitled",
                "ServiceName": "Not Found"
            }
        ]

         ```

        ### Field Notes


        - `AppointmentBookingID` is returned in the response and should
        correspond to the `AppointmentBookingId` query param.
            
        - `Mobile` may contain sensitive phone data; avoid logging it in
        plaintext.
            
        - `OldTime` / `NewTime` indicate time changes (if applicable).
            

        ---


        ## Error / Edge Case Notes


        This request currently has no saved error examples. Typical patterns to
        watch for:


        - **400 Bad Request**: missing/invalid `AppointmentBookingId`.
            
        - **404 Not Found**: no provider details found for the given booking ID.
            
        - **500 Internal Server Error**: unexpected server-side failure.
            

        Suggested client-side handling:


        - Validate `AppointmentBookingId` is present and numeric before calling.
            
        - If response is an empty array, treat as “no data found” (depending on
        backend behavior).
            

        ---
      operationId: getproviderdetailsbyappointment
      parameters:
        - name: AppointmentBookingId
          in: query
          schema:
            type: string
            example: '7871'
      responses:
        '200':
          description: getproviderdetailsbyappointment
          headers:
            Access-Control-Allow-Credentials:
              schema:
                type: string
                example: 'true'
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '340'
            Date:
              schema:
                type: string
                example: Sat, 28 Feb 2026 07:14:40 GMT
            ETag:
              schema:
                type: string
                example: W/"154-ANLH87PI0f/69Yuxu7+Zdj+2oPc"
            Strict-Transport-Security:
              schema:
                type: string
                example: max-age=15724800; includeSubDomains
            Vary:
              schema:
                type: string
                example: Origin
            X-Powered-By:
              schema:
                type: string
                example: Express
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    Address:
                      type: string
                      example: Lokhandwala Complex, Andheri (W) Mumbai - 400053
                    AppointmentBookingID:
                      type: number
                      example: 7871
                    Category:
                      type: string
                      example: Doctor
                    FullName:
                      type: string
                      example: Dr. Deepak Kansara
                    Message:
                      type: string
