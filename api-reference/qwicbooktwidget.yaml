  /getuserinformation:
    get:
      summary: getuserinformation
      description: >-
        ## getuserinformation


        Fetches user/account information for a given admin user master record.
        Use the API in the About Qwicbook page to fetch the Doctor Registration
        details that includes the Subscription Expire Date which is available in
        the `ExpireDate` attribute


        ### Base URL


        `https://d300b.twidget.io`


        ### Endpoint


        `GET /getuserinformation`


        ### Query parameters


        | Name | Required | Type | Description |

        | --- | --- | --- | --- |

        | `AdminUserMasterId` | Yes | integer | Representing a Doctor's ID |


        ### Example request


        ``` http

        GET https://d300b.twidget.io/getuserinformation?AdminUserMasterId=1

         ```

        ### 200 OK (Success)


        Returns an array of objects.


        #### Response schema (200)


        ``` json

        [
          {
            "CustomerNumber": "string",
            "ExpiryDate": "string",
            "RegisteredEmailID": "string",
            "RegisteredMobile": "string",
            "Remarks": "string",
            "SupportMobileNumber1": "string | null"
          }
        ]

         ```

        #### Sample response (from last run)


        ``` json

        [
          {
            "CustomerNumber": "108155",
            "ExpiryDate": "31-Dec-2030",
            "RegisteredEmailID": "drdeepakhbk@gmail.com",
            "RegisteredMobile": "7391891540",
            "Remarks": "",
            "SupportMobileNumber1": null
          }
        ]

         ```

        ### Common error responses (generic)


        - **401 Unauthorized**: Missing/invalid authentication.
            
        - **403 Forbidden**: Authenticated but not permitted.
            
        - **404 Not Found**: Endpoint not found or resource unavailable.
            
        - **500 Internal Server Error**: Unexpected server error.
            

        ### Notes


        - **PII**: The response can include personally identifiable information
        (e.g., `RegisteredEmailID`, `RegisteredMobile`). Handle/store with care
        and avoid sharing in logs or public docs.
            
        - **Caching**: If responses are cached (client/proxy/server), ensure
        caching is configured appropriately to prevent unintended exposure of
        user data. Prefer `Cache-Control: no-store` (or equivalent) when dealing
        with PII, and avoid caching on shared devices/browsers.
      operationId: getuserinformation
      parameters:
        - name: AdminUserMasterId
          in: query
          schema:
            type: string
            example: '1'
      responses:
        '200':
          description: getuserinformation
          headers:
            Access-Control-Allow-Credentials:
              schema:
                type: string
                example: 'true'
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '173'
