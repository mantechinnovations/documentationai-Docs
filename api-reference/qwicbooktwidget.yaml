        "description": "### Purpose\n\nCreate/insert a new appointment in the Qwicbook system.\n\n### Endpoint\n\n- **Method:** `POST`\n    \n- **URL:** `https://d300b.twidget.io/insertappointments`\n    \n\n### Authentication\n\n- Not configured in this request.\n    \n\n### Headers\n\n- This endpoint expects JSON.\n    \n- Typical header:\n    \n    - `Content-Type: application/json`\n        \n\n### Request body (JSON)\n\n| Field | Type | Required | Description | Example |\n| --- | --- | --- | --- | --- |\n| `AdminUserMasterID` | string/number | Yes | Always pass `6`. This identifies that the booking is being done by receptionist. | `\"6\"` |\n| `APServiceTransID` | string/number | Yes | Slot reference ID. | `\"28893\"` |\n| `Remarks` | string | No | Notes/remarks for the appointment. | `\"from postman Twidget\"` |\n| `BookedForDate` | string | Yes | Appointment date. See **Date format** notes below. | `\"3-Mar-2026\"` |\n| `PatientName` | string | Yes | Patient/customer name. | `\"Tushar Parmar\"` |\n| `AlternateMobile` | string | No | Patient Mobile Number for contact. | `\"7391891540\"` |\n\n### Example request\n\n``` json\nPOST https://d300b.twidget.io/insertappointments\nContent-Type: application/json\n{\n  \"AdminUserMasterID\": \"6\",\n  \"APServiceTransID\": \"28893\",\n  \"Remarks\": \"from postman Twidget\",\n  \"BookedForDate\": \"16-Mar-2026\",\n  \"PatientName\": \"Tushar Parmar\",\n  \"AlternateMobile\": \"7391891540\"\n}\n\n ```\n\n### Example responses (generic)\n\n#### Success (200 OK) - If `AppointmentBookinfID` value is greater than `0`\n\n``` json\n[\n    {\n        \"AppointmentBookingID\": 7931,\n        \"Token\": \"3\"\n    }\n]\n\n ```\n\n#### Error (200 OK): If the `AppointmentBookingID` value is equal to `0`\n\n``` json\n[\n    {\n        \"AppointmentBookingID\": 0,\n        \"Token\": \"0\"\n    }\n]\n\n ```\n\n### Notes / validations\n\n- Logic: Write your logic based on the response attribute AppointmentBookingID. If it returns 0 then the appointment is not booked. Most of the times its because someone booked the same slot before you.\n    \n- **Date format:** `BookedForDate` is currently sent as `3-Mar-2026` (e.g., `D-MMM-YYYY`). Ensure the server accepts this exact format and locale (English month abbreviations).\n    \n- **IDs as strings:** `AdminUserMasterID` and `APServiceTransID` are sent as strings here. If the API expects numbers, send them as JSON numbers instead.\n    \n- **Mobile number:** `AlternateMobile` should typically be digits only; length is 10 digits.\n    \n- **Required fields:** If any required field is missing/blank, expect a 400-level validation response."
