                  value: '1'
  /getnextslot:
    get:
      summary: getnextslot
      description: >-
        Returns the **next available appointment slot** for a given service,
        using a reference date/time. The End Point returns either a 0 (when
        there are no slots available) or a value greater than 0 indicating that
        a slot is available. The response is an `APServiceTransactionID` which
        can be further queried to get details about the slots by a seperate End
        Point.


        ## Endpoint


        `GET /getnextslot`


        Base URL (as used in this collection):  

        `https://d300b.twidget.io`


        ## Query parameters


        | Parameter | Type | Required | Description |

        | --- | --- | --- | --- |

        | `APServiceId` | integer | Yes | Appointment/Service identifier to find
        availability for. Example: `1`. |

        | `CurrentDate` | string | Yes | This is the DateTime.Now as-is Format:
        `D-MMM-YYYY` (e.g., `7-Mar-2026`). |

        | `TodayDate` | string | Yes | Date for which an appointment is
        required. Format: `D-MMM-YYYY` (e.g., `7-Mar-2026`). |

        | `TodayTime` | string | Yes | Appointment Time. Format 24 Hrs: `H:mm`
        (e.g., `17:30)`. |


        ## Date/time format & timezone assumptions


        - Dates appear to be **day-month(short name)-year**: `D-MMM-YYYY`
        (example: `7-Mar-2026`).
            
        - Time appears to be **24-hour** `H:mm` (example: `8:30`).
            
        - The API does **not** include an explicit timezone parameter; it’s
        assumed the server interprets `TodayDate` + `TodayTime` in the
        **service’s/server’s local timezone** (or the timezone configured for
        the service). If your client is in a different timezone, convert
        accordingly before calling.
            

        ## Response


        ### `200 OK`


        Returns a **numeric slot identifier** as the response body (plain text),
        for example:


        - `29335`
            

        > If no slots are available the value `0` is returned 
          

        ## Example call


        ``` http

        GET
        https://d300b.twidget.io/getnextslot?APServiceId=1&CurrentDate=7-Mar-2026&TodayDate=7-Mar-2026&TodayTime=8:30

         ```

        Example success response:


        ``` text

        29335

         ```

        Example : No Slots Available response:


        ``` text

        0

         ```

        You can determine the logic based on the returned value. Stop processing
        if there are no further slots available (0).
      operationId: getnextslot
      parameters:
        - name: APServiceId
          in: query
          schema:
            type: string
            example: '1'
        - name: CurrentDate
          in: query
          schema:
            type: string
            example: 7-Mar-2026
        - name: TodayDate
          in: query
          schema:
            type: string
            example: 7-Mar-2026
        - name: TodayTime
          in: query
          schema:
            type: string
            example: '8:30'
      responses:
        '200':
          description: getnextslot
          headers:
            Access-Control-Allow-Credentials:
              schema:
                type: string
                example: 'true'
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '5'
            Date:
              schema:
                type: string
                example: Sat, 07 Mar 2026 03:08:07 GMT
            ETag:
              schema:
                type: string
                example: W/"5-Kf+L0ZVrZX4ZExmzCmGldLqZrgk"
            Strict-Transport-Security:
              schema:
                type: string
                example: max-age=15724800; includeSubDomains
            Vary:
              schema:
                type: string
                example: Origin
            X-Powered-By:
              schema:
                type: string
                example: Express
          content:
            application/octet-stream:
              examples:
                getnextslot:
                  value: '29335'
  /checkisproviderooo:
    get:
      summary: checkisproviderooo
      description: >-
        ## Purpose


        Checks whether a provider is marked **Out Of Office (OOO)** for a given
        booking date.


        ## Endpoint


        `GET https://d300b.twidget.io/checkisproviderooo`


        ## Query parameters


        | Parameter | Type | Required | Description |

        | --- | --- | --- | --- |

        | `AdminUserMasterId` | number | Yes | Provider/admin user identifier to
        check OOO status for. |

        | `BookingDate` | string | Yes | Booking date to check. Expected format:
        `dd-MMM-yyyy` (e.g., `12-Mar-2026`). |


        ## Response (200 OK)


        Returns a JSON object with:


        | Field | Type | Description |

        | --- | --- | --- |

        | `AdminUserMasterID` | number | Provider/admin user identifier returned
        by the API (note the casing differs from the request param). |

        | `BookingDate` | string | null |

        | `IsOOO` | string | Human-readable message describing OOO/booking
        availability. |

        | `IsOOOFlag` | number | Flag indicating OOO/availability state (e.g.,
        `1` indicates OOO / bookings not open). |


        ## Example request


        ``` http

        GET /checkisproviderooo?AdminUserMasterId=1&BookingDate=12-Mar-2026
        HTTP/1.1

        Host: d300b.twidget.io

         ```

        ## Example response - When doctor is Out of Office or when The Booking
        Windows has not yet opened


        ``` json

        {
          "AdminUserMasterID": 0,
          "BookingDate": null,
          "IsOOO": "Appointment bookings will open 2 day(s) ...",
          "IsOOOFlag": 1
        }

         ```

        ## When Doctor is working as usual


        ``` json

        {
            "AdminUserMasterID": 0,
            "BookingDate": null,
            "IsOOO": "Working",
            "IsOOOFlag": 0
        }

         ```
