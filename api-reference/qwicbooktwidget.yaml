        "description": "## Purpose\n\nCreates or updates an “Out Of Office (OOO)” entry for a Doctor.\n\n## Endpoint\n\n`POST https://d300b.twidget.io/insertooo`\n\n## Request body (JSON)\n\nSend a JSON object in the request body.\n\n### Fields\n\n| Field | Type | Required | Notes / Format |\n| --- | --- | --- | --- |\n| `OOOID` | string (numeric ID) | Yes | OOO record identifier. ALways use`\"0\"` to create a new OOO entry; or to update |\n| `AdminUserMasterID` | string (numeric ID) | Yes | Doctor ID to which the OOO entry belongs to. |\n| `IsOOO` | string or number | Yes | Flag indicating OOO status: `0` = not OOO, `1` = OOO. |\n| `OOOFrom` | string (datetime) | Yes | Start datetime in ISO 8601 format (e.g., `YYYY-MM-DDTHH:mm:ss`). Example: `2026-02-01T00:00:00`. |\n| `OOOTo` | string (datetime) | Yes | End datetime in ISO 8601 format (e.g., `YYYY-MM-DDTHH:mm:ss`). Example: `2026-02-10T00:00:00`. |\n| `OOOMessage` | string | Yes | Message to display while the user is out of office. |\n\n## Example request payload\n\n``` json\n{\n  \"OOOID\": \"0\",\n  \"AdminUserMasterID\": \"1\",\n  \"IsOOO\": \"0\",\n  \"OOOFrom\": \"2026-02-01T00:00:00\",\n  \"OOOTo\": \"2026-02-10T00:00:00\",\n  \"OOOMessage\": \"I am out of office\"\n}\n\n ```\n\n## Response\n\n### Success\n\n- **HTTP 200 OK**\n    \n- Response body (based on the current successful response):\n    - `1`\n        \n\nThe value `1` indicates the operation succeeded. Note, that the value returned is always `1` irrespective of success or failure. So, endure that the operation is validated agains the table `Admin_OOO` after an update."
