        "description": "## Purpose\n\nRetrieve Doctor details for a specific AdminUserMasterID (doctor's Id)\n\n## Base URL + Endpoint\n\n- **Base URL:** `https://d300b.twidget.io`\n    \n- **Endpoint:** `GET /getuser`\n    \n\n## Required Query Parameter\n\n| Name | Type | Required | Example |\n| --- | --- | --- | --- |\n| `AdminUserMasterId` | integer | Yes | `1` |\n\n## Example Request\n\n``` http\nGET https://d300b.twidget.io/getuser?AdminUserMasterId=1\n\n ```\n\n## Example 200 Response (key fields)\n\nThe response is a JSON array of user objects. Common fields include:\n\n- **Identifiers:** `AdminUserMasterID`, `APServiceID`\n    \n- **Status/flags:** `Active`, `IsUserAvailable`, `UserType`\n    \n- **Profile:** `FirstName`, `LastName`, `DisplayName`, `UserQualification`, `UserCategory`\n    \n- **Contact:** `Email`, `Mobile`\n    \n- **Location:** `Address1`, `Address2`, `City`, `State`, `AreaID`, `CityID`, `StateID`, `CountryID`\n    \n- **Other:** `DeviceID`, `ShopCount`, `ShopNames`\n    \n\nSensitive field:\n\n- `Password` **is returned** in the response (sensitive). Treat as confidential and avoid exposing or logging it.\n    \n\n## Example Response (200)\n\n``` json\n[\n    {\n        \"APServiceID\": 0,\n        \"Active\": \"1\",\n        \"Address1\": \"75 Hatkesh Society\",\n        \"Address2\": \"Juhu Scheme\",\n        \"AdminUserMasterID\": 1,\n        \"AreaID\": 10,\n        \"City\": \"Mumbai\",\n        \"CityID\": 9,\n        \"CountryID\": 1,\n        \"DeviceID\": null,\n        \"DisplayName\": null,\n        \"Email\": \"drdeepakhbk@gmail.com\",\n        \"FirstName\": \"Dr. Deepak\",\n        \"IsUserAvailable\": false,\n        \"LastName\": \"Kansara\",\n        \"Mobile\": \"8380021488\",\n        \"Password\": \"d*********t\",\n        \"ShopCount\": 0,\n        \"ShopNames\": null,\n        \"State\": \"MH\",\n        \"StateID\": 2,\n        \"UserCategory\": null,\n        \"UserQualification\": null,\n        \"UserType\": \"Provider\"\n    }\n]\n\n ```"
      },
