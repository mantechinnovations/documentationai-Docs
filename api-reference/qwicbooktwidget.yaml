        "description": "## getuserinformation\n\nFetches user/account information for a given admin user master record. Use the API in the About Qwicbook page to fetch the Doctor Registration details that includes the Subscription Expire Date which is available in the `ExpireDate` attribute\n\n### Base URL\n\n`https://d300b.twidget.io`\n\n### Endpoint\n\n`GET /getuserinformation`\n\n### Query parameters\n\n| Name | Required | Type | Description |\n| --- | --- | --- | --- |\n| `AdminUserMasterId` | Yes | integer | Representing a Doctor's ID |\n\n### Example request\n\n``` http\nGET https://d300b.twidget.io/getuserinformation?AdminUserMasterId=1\n\n ```\n\n### 200 OK (Success)\n\nReturns an array of objects.\n\n#### Response schema (200)\n\n``` json\n[\n  {\n    \"CustomerNumber\": \"string\",\n    \"ExpiryDate\": \"string\",\n    \"RegisteredEmailID\": \"string\",\n    \"RegisteredMobile\": \"string\",\n    \"Remarks\": \"string\",\n    \"SupportMobileNumber1\": \"string | null\"\n  }\n]\n\n ```\n\n#### Sample response (from last run)\n\n``` json\n[\n  {\n    \"CustomerNumber\": \"108155\",\n    \"ExpiryDate\": \"31-Dec-2030\",\n    \"RegisteredEmailID\": \"drdeepakhbk@gmail.com\",\n    \"RegisteredMobile\": \"7391891540\",\n    \"Remarks\": \"\",\n    \"SupportMobileNumber1\": null\n  }\n]\n\n ```\n\n### Common error responses (generic)\n\n- **401 Unauthorized**: Missing/invalid authentication.\n    \n- **403 Forbidden**: Authenticated but not permitted.\n    \n- **404 Not Found**: Endpoint not found or resource unavailable.\n    \n- **500 Internal Server Error**: Unexpected server error.\n    \n\n### Notes\n\n- **PII**: The response can include personally identifiable information (e.g., `RegisteredEmailID`, `RegisteredMobile`). Handle/store with care and avoid sharing in logs or public docs.\n    \n- **Caching**: If responses are cached (client/proxy/server), ensure caching is configured appropriately to prevent unintended exposure of user data. Prefer `Cache-Control: no-store` (or equivalent) when dealing with PII, and avoid caching on shared devices/browsers."
      },
