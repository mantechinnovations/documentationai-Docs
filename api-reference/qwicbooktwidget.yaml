        "description": "## Purpose\n\nReturns the most recently saved **Late entry details** for a given admin user. Populate the UI with these details with \"LateDate\" and \"LateTime\"\n\n## Endpoint\n\n- **Method:** `GET`\n    \n- **URL:** `https://d300b.twidget.io/getlatedetails`\n    \n\n## Query parameters\n\n| Name | Type | Required | Description |\n| --- | --- | --- | --- |\n| `AdminUserMasterId` | integer | Yes | Admin user identifier whose latest “late” details should be returned. |\n\n> No other query parameters are currently supported by this request. \n  \n\n## Example request\n\n``` http\nGET https://d300b.twidget.io/getlatedetails?AdminUserMasterId=1\n\n ```\n\n## Success response (200)\n\n### Response schema\n\n``` json\n{\n  \"AdminUserMasterID\": 0,\n  \"LateDate\": \"string\",\n  \"LateID\": 0,\n  \"LateTime\": \"string\",\n  \"Message\": \"string\"\n}\n\n ```\n\n### Sample response: Positive Test Case\n\n``` json\n{\n  \"AdminUserMasterID\": 1,\n  \"LateDate\": \"09-Feb-2026, Mon\",\n  \"LateID\": 1086,\n  \"LateTime\": \"11:27\",\n  \"Message\": \"Last saved entry being displayed\"\n}\n\n ```\n\n### Sample response: Negtive Test Case\n\n``` json\n{\n    \"AdminUserMasterID\": 199,\n    \"LateDate\": \"07-Mar-2026, Sat\",\n    \"LateID\": 0,\n    \"LateTime\": \"00::00\",\n    \"Message\": \"Oops!  Cannot find User\"\n}\n\n ```\n\n## Notes on date/time formats\n\n- `LateDate` is returned as a formatted string (example: `09-Feb-2026, Mon`). Treat this as **display-formatted**, not an ISO-8601 date.\n    \n- `LateTime` is returned as a string in `HH:mm` (24-hour) format (example: `11:27`).\n    \n\n## Error cases (placeholders)\n\n> The exact response body for errors is not yet documented; add examples when available. \n  \n\n- **401 Unauthorized** — Missing/invalid authentication.\n    \n- **403 Forbidden** — Authenticated but not permitted to access the specified admin user’s data.\n    \n- **404 Not Found** — No record found for the given `AdminUserMasterId` (or endpoint not found).\n    \n- **500 Internal Server Error** — Unexpected server-side error."
