        "description": "### Authenticate\n\nAuthenticates a user using an email address and password and returns a boolean indicating whether the credentials are valid.\n\n#### Purpose\n\nUse this endpoint to verify a user’s credentials before allowing access to protected flows.\n\n#### Required query parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| `Email` | string | Yes | User’s email address. |\n| `Password` | string | Yes | User’s password. |\n\n#### Example call\n\n`GET` [<code>https://d300b.twidget.io/authenticate?Email={{email}}&amp;Password={{password}}</code>](https://d300b.twidget.io/authenticate?Email=%7B%7Bemail%7D%7D&Password=%7B%7Bpassword%7D%7D)\n\nExpected response\n\n- **200 OK**\n    \n- Body: boolean\n    \n    - `true` — credentials are valid\n        \n    - `false` — credentials are invalid"
