        ## Purpose


        Returns the most recently saved **Late entry details** for a given admin
        user. Populate the UI with these details with "LateDate" and "LateTime"


        ## Endpoint


        - **Method:** `GET`
            
        - **URL:** `https://d300b.twidget.io/getlatedetails`
            

        ## Query parameters


        | Name | Type | Required | Description |

        | --- | --- | --- | --- |

        | `AdminUserMasterId` | integer | Yes | Admin user identifier whose
        latest “late” details should be returned. |


        > No other query parameters are currently supported by this request. 
          

        ## Example request


        ``` http

        GET https://d300b.twidget.io/getlatedetails?AdminUserMasterId=1

         ```

