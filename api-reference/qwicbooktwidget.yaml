        "description": "## Overview\n\nRetrieves the **Out Of Office (OOO)** status and data for a doctor.\n\nThis endpoint returns a JSON with FromTime and ToTime as Dates in format dd-MMM-yyyy. It also has a flaf \"IsOOO\" = 1 or 0; where 1 means Out of Office (check box checked) and \"0\" means Working. Uncheck the checkbox. The \"OOOMeaage\" is the message that is displayed on the App., and on the ChatBot that the doctor has entered.\n\n## Endpoint\n\n`GET /getooo`\n\nBase URL (as currently configured):  \n`https://d300b.twidget.io`\n\n## Required query parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| `AdminUserMasterId` | integer | Yes | Admin user identifier to fetch OOO details for. |\n\n## Example request\n\n``` http\nGET https://d300b.twidget.io/getooo?AdminUserMasterId=1\n\n ```\n\n## Example 200 response - Positive Test Results\n\n``` json\n{\n  \"AdminUserMasterID\": 1,\n  \"IsOOO\": 1,\n  \"OOOFrom\": \"19-Mar-2026, Thu\",\n  \"OOOID\": 2,\n  \"OOOMessage\": \"I am out of office.\",\n  \"OOOTo\": \"19-Mar-2026, Thu\"\n}\n\n ```\n\n## Example 200 response - Negative Test Results\n\n``` json\n{\n    \"AdminUserMasterID\": 999,\n    \"IsOOO\": 0,\n    \"OOOFrom\": \"\",\n    \"OOOID\": 0,\n    \"OOOMessage\": \"\",\n    \"OOOTo\": \"\"\n}\n\n ```\n\n## Response fields (observed)\n\n| Field | Type | Description |\n| --- | --- | --- |\n| `AdminUserMasterID` | integer | Admin user identifier returned by the service. |\n| `IsOOO` | integer | OOO flag (commonly `1` = out of office, `0` = not out of office). |\n| `OOOFrom` | string | Start date of OOO range (formatted as returned by the API). |\n| `OOOID` | integer | OOO record identifier. |\n| `OOOMessage` | string | Message shown when user is out of office. |\n| `OOOTo` | string | End date of OOO range (formatted as returned by the API). |\n\n## Notes / behavior\n\n- If `AdminUserMasterId` does not exist or is invalid, the API may return an error or an empty/alternate payload depending on backend behavior.\n    \n- Date fields (`OOOFrom`, `OOOTo`) are returned as formatted strings (not ISO 8601) as observed in the current response.\n    \n- `IsOOO` is returned as a numeric flag; treat it as a boolean-like value in client logic."
