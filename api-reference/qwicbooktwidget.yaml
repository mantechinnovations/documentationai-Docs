        "description": "## Overview\n\nReturns the list of provider/services available for a given doctor represented as `AdminUserMasterId`\n\nThis endpoint is typically used to fetch the doctor's active clinics.\n\n## Base URL\n\n`https://d300b.twidget.io`\n\n## Endpoint\n\n`GET /providerdetails`\n\n## Query parameters\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| `AdminUserMasterId` | integer | Yes | Admin user master identifier used to look up provider/service details. |\n\n## Example request\n\n``` http\nGET https://d300b.twidget.io/providerdetails?AdminUserMasterId=1\n\n ```\n\n## Example 200 response\n\n``` json\n[\n  {\n    \"APServiceID\": 1,\n    \"AssociationType\": null,\n    \"ServiceName\": \"Lokhandwala Clinic\"\n  },\n  {\n    \"APServiceID\": 2,\n    \"AssociationType\": null,\n    \"ServiceName\": \"Juhu Clinic\"\n  },\n  {\n    \"APServiceID\": 103,\n    \"AssociationType\": null,\n    \"ServiceName\": \"Orchid Hospital (Orthopedic)\"\n  },\n  {\n    \"APServiceID\": 5,\n    \"AssociationType\": null,\n    \"ServiceName\": \"Nijanand Clinic\"\n  }\n]\n\n ```"
