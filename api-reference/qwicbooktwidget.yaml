        "description": "## Purpose\n\nRegisters or updates the **FCM (Firebase Cloud Messaging) device token** for a specific admin user (doctor/provider). This token is used to send push notifications to the user's mobile device.\n\n## Endpoint\n\n- **Method:** `POST`\n    \n- **URL:** `https://d300b.twidget.io/updatetuserdevice`\n    \n\n## Request Body (JSON)\n\nSend a JSON object in the request body with the following parameters:\n\n| Parameter | Type | Required | Description |\n| --- | --- | --- | --- |\n| `AdminUserMasterID` | String | Yes | The unique identifier of the admin user (doctor/provider) whose device token is being updated. |\n| `DeviceID` | String | Yes | The FCM (Firebase Cloud Messaging) device token for the user's mobile device. This token is used by the server to send push notifications to the specific device. |\n\n### Example Request Body\n\n``` json\n{\n  \"AdminUserMasterID\": \"1\",\n  \"DeviceID\": \"APA91bH8v-n66UWLZuiQW6bm7zSZaHO_vhZ5_Qkw...\"\n}\n\n ```\n\n## Expected Response\n\n**Status:** `200 OK`\n\n**Body:** `1`\n\nA response value of `1` indicates that the device token was successfully saved or updated for the specified admin user."
