  /deletemultipleappointments:
    get:
      summary: deletemultipleappointments
      description: >-
        ## Purpose


        Deletes (cancels/removes) one or more appointment bookings in the
        Qwicbook system.


        - **Endpoint:** `/deletemultipleappointments`
            
        - **Method:** `GET`
            

        ## Base URL


        ``` text

        https://d300b.twidget.io

         ```

        ## Query parameters


        | Parameter | Type | Required | Description |

        | --- | --- | --- | --- |

        | `AppointmentBookingIDs` | string | Yes | One or more appointment
        booking IDs to delete. This API name implies multiple IDs are supported
        (often comma-separated), e.g. `7838,7839`. |


        ## Example usage


        Single ID:


        ``` text

        GET
        https://d300b.twidget.io/deletemultipleappointments?AppointmentBookingIDs=7838

         ```

        Multiple IDs (if supported by your backend):


        ``` text

        GET
        https://d300b.twidget.io/deletemultipleappointments?AppointmentBookingIDs=7838,7839

         ```

        ## Responses


        ### `200 OK`


        The API returns a plain text / numeric body.


        Example response body: Greater than 0 meaning the appointment is
        deleted. If two apointments are deleted the response will be 2, so on
        and so forth


        ``` text

        1

         ```

        **Response meaning (common patterns):**


        - `0` indicates No appointments are deleted (error). Implementation
        return a count of deleted records instead.
            

        ## Cautions / notes


        - **Destructive operation:** This deletes/cancels appointments. Use with
        care, especially in production.
            
        - **GET used for deletion:** Although this endpoint uses `GET`, it
        performs a state-changing action. Be cautious when sharing URLs, saving
        them in history, or running monitors/automations.
            
        - **Multiple IDs format:** If multiple IDs are supported, verify the
        delimiter/format (comma-separated vs. repeated query params) in the
        backend implementation.
      operationId: deletemultipleappointments
      parameters:
        - name: AppointmentBookingIDs
          in: query
          schema:
            type: string
            example: '7838'
      responses:
        '200':
          description: deletemultipleappointments
          headers:
            Access-Control-Allow-Credentials:
              schema:
                type: string
                example: 'true'
