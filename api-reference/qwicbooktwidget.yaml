  /getschedule:
    get:
      summary: getschedule
      description: >-
        ## Purpose


        Retrieve the appointment schedule (time slots) for a given service
        (`APServiceId`) on a specific date/time context.


        This endpoint returns an array of time slots with token information
        embedded in `FromTime`.


        Example: Assuming today is 14-Mar-26 (CurrentDate). On this date, want
        to book a future appointment for 16-Mar-26 (TodayDate) at 14:30
        (TodayTime).


        Note: The Slots (ToTime) are dynamic based upon the appointment date;
        meaning, past dates appointments cannot be booked included past time.


        ---


        ## Query parameters


        | Parameter | Type | Required | Example | Description |

        | --- | --- | --- | --- | --- |

        | `APServiceId` | integer | Yes | `1` | Shop Identifier |

        | `CurrentDate` | string (date) | Yes | `14-Mar-2026` | The date on
        which the schedule is being fetched |

        | `TodayDate` | string (date) | Yes | `16-Mar-2026` | Date <u>for </u>
        which the booking should be done. |

        | `TodayTime` | string (time) | Yes | `14:30` | Time <u>for </u> which
        the booking should be done |


        ---


        ## Example request


        ``` http

        GET
        https://d300b.twidget.io/getschedule?APServiceId=1&CurrentDate=14-Mar-2026&TodayDate=16-Mar-2026&TodayTime=14:30

         ```

        ---


        ## Example response (200): Positive Validation when slots are available.


        ``` json

        [
          {
            "APServiceID": 1,
            "APServiceTransID": 29335,
            "CurrentDate": null,
            "Day": 0,
            "DayPart": "M",
            "FromTime": "11:00 | TKN: 1",
            "IsOOOFlag": 0,
            "ToTime": "11:05"
          },
          {
            "APServiceID": 1,
            "APServiceTransID": 29336,
            "CurrentDate": null,
            "Day": 0,
            "DayPart": "M",
            "FromTime": "11:05 | TKN: 2",
            "IsOOOFlag": 0,
            "ToTime": "11:10"
          }
        ]

         ```

        ## Example response: When there are no slots available for a given date


        ``` json

        [
            {
                "APServiceID": 0,
                "APServiceTransID": 0,
                "CurrentDate": null,
                "Day": 0,
                "DayPart": null,
                "FromTime": "No Schedule for the day",
                "IsOOOFlag": 0,
                "ToTime": null
            }
        ]

         ```

        ### Date/time formats


        - `CurrentDate` / `TodayDate` are expected in `DD-MMM-YYYY` format
        (e.g., `14-Mar-2026`).
            
        - `TodayTime` is expected in 24-hour `HH:mm` format (e.g., `14:30`).
            

        ### Token parsing (`FromTime`)


        - `FromTime` contains a human-readable time plus token, typically in the
        form: Always use the FormTime to display the available slots.
            
            - `"HH:mm | TKN: N"`
                
        - If you need the token as a number, parse the substring after `TKN:`
        and trim whitespace.
            

        ### Flags


        - `IsOOOFlag` indicates out-of-office/unavailable status (commonly `0`
        for available, `1` for unavailable).
      operationId: getschedule
      parameters:
        - name: APServiceId
          in: query
          schema:
            type: string
            example: '1'
        - name: CurrentDate
          in: query
          schema:
            type: string
            example: 9-Feb-2026
        - name: TodayDate
