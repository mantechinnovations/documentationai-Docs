            ETag:
              schema:
                type: string
                example: W/"1-NWoZK3kTsExUV00Ywo1G5jlUKKs"
            Strict-Transport-Security:
              schema:
                type: string
                example: max-age=15724800; includeSubDomains
            Vary:
              schema:
                type: string
                example: Origin
            X-Powered-By:
              schema:
                type: string
                example: Express
          content:
