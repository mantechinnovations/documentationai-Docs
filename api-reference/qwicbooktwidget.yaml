  /checkusertype:
    get:
      summary: checkusertype
      description: >-
        Determines the user type for a given email address. The UserTy\[e
        attribute could either hold `Provider` or `User` as a value


        ### Purpose


        Use this endpoint to look up which **UserType** (e.g., `Provider`) is
        associated with the provided email. The response also includes basic
        profile identifiers (IDs and contact fields) for the matched user.


        ### Query parameters


        | Name | Type | Required | Description |

        | --- | --- | --- | --- |

        | `Email` | string | Yes | Email address to check. Must be URL-encoded
        when it contains special characters (e.g., `+`, spaces). |


        ### Example request


        ``` http

        GET https://d300b.twidget.io/checkusertype?Email=drdeepakhbk@gmail.com

         ```

        ### Example 200 response


        ``` json

        [
          {
            "AdminUserMasterID": 1,
            "City": "Mumbai",
            "CityID": 9,
            "Mobile": "8380021488",
            "UserType": "Provider"
          }
        ]

         ```

        ### Example 200 response: When User Not Found


        Take a note of the `AdminUserMasterID` attribute returning `0` if the
        data is not found.


        ``` json

        [
            {
                "AdminUserMasterID": 0,
                "City": null,
                "CityID": 0,
                "Mobile": "0",
                "UserType": "User type not found"
            }
        ]

         ```
      operationId: checkusertype
      parameters:
        - name: Email
          in: query
          schema:
            type: string
            example: drdeepakhbk@gmail.com
      responses:
        '200':
          description: checkusertype
          headers:
            Access-Control-Allow-Credentials:
              schema:
                type: string
                example: 'true'
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '96'
            Date:
              schema:
                type: string
                example: Sat, 28 Feb 2026 07:12:41 GMT
            ETag:
              schema:
                type: string
                example: W/"60-BlQaC41vL8dlWsZy/0WbPqZ1Mq4"
            Strict-Transport-Security:
              schema:
                type: string
                example: max-age=15724800; includeSubDomains
            Vary:
              schema:
                type: string
                example: Origin
            X-Powered-By:
              schema:
                type: string
                example: Express
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    AdminUserMasterID:
                      type: number
                      example: 1
                    City:
                      type: string
                      example: Mumbai
                    CityID:
                      type: number
                      example: 9
                    Mobile:
                      type: string
                      example: '8380021488'
                    UserType:
                      type: string
                      example: Provider
                example:
                  - AdminUserMasterID: 1
                    City: Mumbai
                    CityID: 9
                    Mobile: '8380021488'
                    UserType: Provider
              examples:
                checkusertype:
                  value:
                    - AdminUserMasterID: 1
                      City: Mumbai
                      CityID: 9
                      Mobile: '8380021488'
                      UserType: Provider
      security:
        - {}
  /authenticate:
    get:
      summary: authenticate
      description: >-
        ### Authenticate


        Authenticates a user using an email address and password and returns a
        boolean indicating whether the credentials are valid.


        #### Purpose


        Use this endpoint to verify a user’s credentials before allowing access
        to protected flows.


        #### Required query parameters


        | Parameter | Type | Required | Description |

        | --- | --- | --- | --- |

        | `Email` | string | Yes | User’s email address. |

        | `Password` | string | Yes | User’s password. |


        #### Example call


        `GET`
        [<code>https://d300b.twidget.io/authenticate?Email={{email}}&amp;Password={{password}}</code>](https://d300b.twidget.io/authenticate?Email=%7B%7Bemail%7D%7D&Password=%7B%7Bpassword%7D%7D)


        Expected response


        - **200 OK**
            
        - Body: boolean
            
            - `true` — credentials are valid
                
            - `false` — credentials are invalid
      operationId: authenticate
      parameters:
        - name: Email
          in: query
          schema:
            type: string
            example: drdeepakhbk@gmail.com
        - name: Password
          in: query
          schema:
            type: string
            example: development
      responses:
        '200':
          description: authenticate
          headers:
            Access-Control-Allow-Credentials:
              schema:
                type: string
                example: 'true'
            Connection:
              schema:
                type: string
                example: keep-alive
            Content-Length:
              schema:
                type: string
                example: '4'
            Date:
              schema:
                type: string
                example: Sat, 28 Feb 2026 07:13:09 GMT
            ETag:
              schema:
                type: string
                example: W/"4-X/5TO4MPCKAyY0ipFgr6/IraRNs"
            Strict-Transport-Security:
              schema:
                type: string
                example: max-age=15724800; includeSubDomains
            Vary:
              schema:
                type: string
                example: Origin
            X-Powered-By:
              schema:
                type: string
                example: Express
          content:
            application/octet-stream:
              examples:
                authenticate:
                  value: 'true'
      security:
        - {}
  /getuser:
    get:
      summary: getuser
      description: >-
        ## Purpose


        Retrieve Doctor details for a specific AdminUserMasterID (doctor's Id)


        ## Base URL + Endpoint


        - **Base URL:** `https://d300b.twidget.io`
            
        - **Endpoint:** `GET /getuser`
            

        ## Required Query Parameter


        | Name | Type | Required | Example |

        | --- | --- | --- | --- |

        | `AdminUserMasterId` | integer | Yes | `1` |


        ## Example Request


        ``` http

        GET https://d300b.twidget.io/getuser?AdminUserMasterId=1

         ```

        ## Example 200 Response (key fields)


        The response is a JSON array of user objects. Common fields include:


        - **Identifiers:** `AdminUserMasterID`, `APServiceID`
            
        - **Status/flags:** `Active`, `IsUserAvailable`, `UserType`
            
        - **Profile:** `FirstName`, `LastName`, `DisplayName`,
        `UserQualification`, `UserCategory`
            
        - **Contact:** `Email`, `Mobile`
            
        - **Location:** `Address1`, `Address2`, `City`, `State`, `AreaID`,
        `CityID`, `StateID`, `CountryID`
            
        - **Other:** `DeviceID`, `ShopCount`, `ShopNames`
            

        Sensitive field:


        - `Password` **is returned** in the response (sensitive). Treat as
        confidential and avoid exposing or logging it.
            

        ## Example Response (200)


        ``` json

        [
            {
                "APServiceID": 0,
                "Active": "1",
                "Address1": "75 Hatkesh Society",
                "Address2": "Juhu Scheme",
                "AdminUserMasterID": 1,
                "AreaID": 10,
                "City": "Mumbai",
